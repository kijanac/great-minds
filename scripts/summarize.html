<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Summarize</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    font-size: 14px;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    border-right: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid #2a2a2a;
  }

  #sidebar-header p {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #555;
    margin-bottom: 7px;
  }

  #search {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    padding: 5px 9px;
    color: #e0e0e0;
    font-size: 12px;
    outline: none;
  }
  #search:focus { border-color: #555; }

  #doc-list { flex: 1; overflow-y: auto; }

  .group-header {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #555;
    cursor: pointer;
    user-select: none;
  }
  .group-header:hover { background: #1a1a1a; color: #999; }
  .group-header .count { margin-left: auto; font-weight: 400; text-transform: none; }

  .group-items { display: none; }
  .group-items.open { display: block; }

  .doc-item {
    display: block;
    width: 100%;
    padding: 3px 10px 3px 22px;
    text-align: left;
    background: none;
    border: none;
    color: #aaa;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .doc-item:hover { background: #1a1a1a; color: #fff; }
  .doc-item.selected { background: #1a2a1a; color: #6fcf6f; font-weight: 600; }

  /* ── Right side ── */
  #right {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Controls strip ── */
  #controls {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    padding: 10px 14px;
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
  }

  #controls textarea {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    padding: 7px 10px;
    color: #e0e0e0;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    resize: none;
    min-width: 0;
  }
  #controls textarea:focus { border-color: #555; }

  #controls select {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    padding: 7px 10px;
    color: #e0e0e0;
    font-size: 12px;
    outline: none;
    white-space: nowrap;
  }
  #controls select:focus { border-color: #555; }

  button {
    padding: 7px 14px;
    border-radius: 5px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  #run-btn  { background: #1e4020; color: #7ed87e; }
  #stop-btn { background: #401e1e; color: #d87e7e; display: none; }
  #run-btn:not(:disabled):hover { background: #265228; }
  #stop-btn:hover { background: #522626; }

  /* ── Content panels ── */
  #panels {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .panel + .panel { border-left: 1px solid #2a2a2a; }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #555;
  }

  .panel-key {
    font-size: 11px;
    color: #444;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dot { display: inline-block; animation: blink 1s infinite; color: #6fcf6f; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
  }

  .panel-body pre {
    font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: #c8c8c8;
  }

  /* markdown-ish styling for doc panel */
  #doc-content { color: #c0c0c0; font-size: 13px; line-height: 1.7; }
  #doc-content h1, #doc-content h2, #doc-content h3 {
    color: #eee; margin: 1em 0 0.3em; font-weight: 600;
  }
  #doc-content h1 { font-size: 1.2em; }
  #doc-content h2 { font-size: 1.05em; }
  #doc-content h3 { font-size: 0.95em; }
  #doc-content p { margin: 0.4em 0; }
  #doc-content hr { border: none; border-top: 1px solid #2a2a2a; margin: 1em 0; }

  .placeholder { font-size: 12px; color: #444; font-style: italic; }
  .error-text { color: #d07070; font-size: 12px; }
</style>
</head>
<body>

<!-- Sidebar: doc list -->
<div id="sidebar">
  <div id="sidebar-header">
    <p>Corpus</p>
    <input id="search" type="text" placeholder="Filter…" />
  </div>
  <div id="doc-list"><p class="placeholder" style="padding:12px">Loading…</p></div>
</div>

<!-- Right: controls + panels -->
<div id="right">

  <!-- Controls strip -->
  <div id="controls">
    <textarea id="context" rows="2"
      placeholder="Context prompt — guide the summarization (e.g. focus on economic arguments…)"></textarea>
    <select id="model-select"><option>Loading…</option></select>
    <button id="run-btn" disabled>Summarize</button>
    <button id="stop-btn">Stop</button>
  </div>

  <!-- Side-by-side panels -->
  <div id="panels">

    <!-- Document panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Document</span>
        <span id="doc-key" class="panel-key">—</span>
        <span id="doc-loading" style="display:none; font-size:11px; color:#555; margin-left:auto">loading…</span>
      </div>
      <div class="panel-body">
        <div id="doc-content"><p class="placeholder">Select a document on the left.</p></div>
      </div>
    </div>

    <!-- Summary panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Summary</span>
        <span id="gen-indicator" style="display:none"><span class="dot">●</span> generating</span>
      </div>
      <div class="panel-body">
        <pre id="summary-output"><span class="placeholder">—</span></pre>
      </div>
    </div>

  </div>
</div>

<script>
const API = '';
let allObjects = [];
let selectedKey = null;
let aborted = false;

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot() {
  const [objs, mods] = await Promise.all([
    fetch(`${API}/objects`).then(r => r.json()),
    fetch(`${API}/models`).then(r => r.json()),
  ]);
  allObjects = objs.objects;
  document.getElementById('model-select').innerHTML =
    mods.models.map(m => `<option value="${m}">${m}</option>`).join('');
  renderList(allObjects);
}

// ── Document list ─────────────────────────────────────────────────────────
function groupBy(objects) {
  const map = new Map();
  for (const obj of objects) {
    const parts = obj.key.split('/');
    const g = parts.length >= 2 ? `${parts[0]}/${parts[1]}` : parts[0];
    if (!map.has(g)) map.set(g, []);
    map.get(g).push(obj);
  }
  return map;
}

const openGroups = new Set();

function renderList(objects) {
  const groups = groupBy(objects);
  const container = document.getElementById('doc-list');
  container.innerHTML = '';
  for (const [group, items] of groups) {
    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML =
      `<span style="font-size:8px">${openGroups.has(group) ? '▼' : '▶'}</span>
       ${group} <span class="count">${items.length}</span>`;
    header.onclick = () => {
      openGroups.has(group) ? openGroups.delete(group) : openGroups.add(group);
      renderList(objects);
    };
    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'group-items' + (openGroups.has(group) ? ' open' : '');
    for (const obj of items) {
      const btn = document.createElement('button');
      btn.className = 'doc-item' + (obj.key === selectedKey ? ' selected' : '');
      btn.textContent = obj.key.split('/').pop();
      btn.title = obj.key;
      btn.onclick = () => selectDoc(obj.key);
      itemsDiv.appendChild(btn);
    }
    container.appendChild(header);
    container.appendChild(itemsDiv);
  }
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderList(q ? allObjects.filter(o => o.key.toLowerCase().includes(q)) : allObjects);
});

// ── Select + load document ────────────────────────────────────────────────
async function selectDoc(key) {
  selectedKey = key;
  document.getElementById('doc-key').textContent = key.split('/').pop();
  document.getElementById('run-btn').disabled = false;
  document.getElementById('summary-output').innerHTML = '<span class="placeholder">—</span>';

  // Re-render list to update selection highlight
  const q = document.getElementById('search').value.toLowerCase();
  renderList(q ? allObjects.filter(o => o.key.toLowerCase().includes(q)) : allObjects);

  // Fetch and render document
  const docEl = document.getElementById('doc-content');
  const loadingEl = document.getElementById('doc-loading');
  docEl.innerHTML = '<p class="placeholder">Loading…</p>';
  loadingEl.style.display = '';

  try {
    const res = await fetch(`${API}/object?key=${encodeURIComponent(key)}`);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const { content } = await res.json();
    docEl.innerHTML = renderMarkdown(content);
  } catch (e) {
    docEl.innerHTML = `<p class="error-text">Failed to load: ${e}</p>`;
  } finally {
    loadingEl.style.display = 'none';
  }
}

// Simple markdown renderer (headings, hr, paragraphs)
function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .split('\n')
    .map(line => {
      if (/^### /.test(line)) return `<h3>${line.slice(4)}</h3>`;
      if (/^## /.test(line))  return `<h2>${line.slice(3)}</h2>`;
      if (/^# /.test(line))   return `<h1>${line.slice(2)}</h1>`;
      if (/^---+$/.test(line.trim())) return '<hr>';
      if (line.trim() === '') return '<br>';
      return `<p>${line}</p>`;
    })
    .join('');
}

// ── Summarize ─────────────────────────────────────────────────────────────
document.getElementById('run-btn').onclick = runSummarize;
document.getElementById('stop-btn').onclick = () => { aborted = true; };

async function runSummarize() {
  if (!selectedKey) return;
  aborted = false;

  const output = document.getElementById('summary-output');
  output.innerHTML = '';

  document.getElementById('run-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = '';
  document.getElementById('gen-indicator').style.display = '';

  let text = '';
  try {
    const res = await fetch(`${API}/summarize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        key: selectedKey,
        context_prompt: document.getElementById('context').value,
        model_id: document.getElementById('model-select').value,
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      output.innerHTML = `<span class="error-text">Error ${res.status}: ${err}</span>`;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      if (aborted) { reader.cancel(); break; }
      const { done, value } = await reader.read();
      if (done) break;
      text += decoder.decode(value, { stream: true });
      output.textContent = text;
      output.parentElement.scrollTop = output.parentElement.scrollHeight;
    }

    if (!text) output.innerHTML = '<span class="placeholder">— (empty response)</span>';
  } catch (e) {
    output.innerHTML = `<span class="error-text">${e}</span>`;
  } finally {
    document.getElementById('stop-btn').style.display = 'none';
    document.getElementById('run-btn').style.display = '';
    document.getElementById('gen-indicator').style.display = 'none';
  }
}

boot().catch(e => {
  document.getElementById('doc-list').innerHTML =
    `<p class="placeholder" style="padding:12px;color:#d07070">Failed to load: ${e}</p>`;
});
</script>
</body>
</html>
