[project]
name = "great-minds"
version = "0.1.0"
description = "LLM-powered research knowledge base framework"
requires-python = ">=3.13"
dependencies = [
    "crawl4ai>=0.8.0",
    "fastapi>=0.135.3",
    "openai>=1.0.0",
    "python-multipart>=0.0.22",
    "ruamel.yaml>=0.18.0",
    "uvicorn>=0.43.0",
]

[project.scripts]
great-minds = "great_minds.cli:main"
