[project]
name = "great-minds"
version = "0.1.0"
description = "LLM-powered research knowledge base framework"
requires-python = ">=3.13"
dependencies = [
    "alembic>=1.18.4",
    "asyncpg>=0.31.0",
    "crawl4ai>=0.8.0",
    "fastapi>=0.135.3",
    "openai>=1.0.0",
    "pydantic-settings>=2.13.1",
    "pydantic[email]>=2.12.5",
    "pyjwt>=2.8.0",
    "python-multipart>=0.0.22",
    "resend>=2.27.0",
    "ruamel.yaml>=0.18.0",
    "sqlalchemy[asyncio]>=2.0.49",
    "uvicorn>=0.43.0",
]

[project.scripts]
great-minds = "great_minds.cli:main"

[tool.ruff.lint]
ignore = ["E712"]
