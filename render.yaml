projects:
  - name: great-minds
    environments:
      - name: production
        services:
          # ── Backend (Docker) ──────────────────────────────────────
          - name: great-minds-api
            type: web
            runtime: docker
            plan: starter
            region: virginia
            healthCheckPath: /health
            disk:
              name: data
              mountPath: /data
              sizeGB: 1
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: great-minds-db
                  property: connectionString
              - key: JWT_SECRET
                generateValue: true
              - key: DATA_DIR
                value: /data
              - key: CORS_ORIGINS
                value: '["https://great-minds-web.onrender.com"]'
              - key: MAILERSEND_API_KEY
                sync: false
              - key: MAILERSEND_FROM_EMAIL
                sync: false

          # ── Frontend (Static) ─────────────────────────────────────
          - name: great-minds-web
            type: web
            runtime: static
            buildCommand: cd web && npm install && npm run build
            staticPublishPath: web/dist
            headers:
              - path: /*
                name: Cache-Control
                value: public, max-age=0, must-revalidate
            routes:
              - type: rewrite
                source: /*
                destination: /index.html
            envVars:
              - key: VITE_API_BASE
                value: https://great-minds-api.onrender.com

        databases:
          - name: great-minds-db
            plan: basic-256mb
            region: virginia
            postgresMajorVersion: 16
            ipAllowList: []
