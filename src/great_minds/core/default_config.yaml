name: "Personal Brain"

metadata:
  texts:
    tradition:
      type: string
      source: enriched
      description: >-
        the intellectual or political tradition this text belongs to
        (e.g. "marxist-leninist", "anarchist", "liberal"). Use a short
        lowercase label. Empty string if unclear.
    interlocutors:
      type: list
      source: enriched
      description: >-
        names of thinkers, writers, or figures this text is responding to,
        arguing against, or in direct dialogue with. Empty list if none.
    notes:
      type: string
      source: provided
      default: ""

  news:
    outlet:
      type: string
      source: provided
    relevance:
      type: string
      source: enriched
      description: >-
        a short label describing why this news item is relevant to the
        knowledge base.
    notes:
      type: string
      source: provided
      default: ""

  ideas:
    status:
      type: string
      source: provided
    notes:
      type: string
      source: provided
      default: ""

  user:
    anchored_to:
      type: string
      source: provided
      description: >-
        slug of the wiki article this suggestion is attached to, if any.
      default: ""
    anchored_section:
      type: string
      source: provided
      description: >-
        section header within the anchored article this suggestion
        targets, if any.
      default: ""
    intent:
      type: string
      source: provided
      description: >-
        what the user is doing with this suggestion (e.g. disagree,
        correct, add_context, restructure).
      default: ""

fields:
  genre:
    max_per_doc: 2
    allow_new: true
    min_uses_to_keep: 3
  tradition:
    allow_new: true
    min_uses_to_keep: 3
  tags:
    allow_new: true
    min_uses_to_keep: 2
  interlocutors:
    allow_new: true
