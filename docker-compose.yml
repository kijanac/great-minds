services:
  db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: great_minds
      POSTGRES_PASSWORD: great_minds
      POSTGRES_DB: great_minds
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U great_minds"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
