name: "Great Minds"

# Config-driven metadata fields per content type.
# Universal fields (title, author, origin, date, genre, tags) are handled by
# code and do NOT appear here. Only content-type-specific fields go below.
#
# Each field specifies:
#   type: string | list
#   source: provided (known at ingestion) | enriched (AI-filled at compile)
#   description: used to build the LLM enrichment prompt (required for enriched fields)
#   default: optional default value
#
# "notes" is the only human-filled field (optional, never overwritten by AI).
# "concepts" links to specific wiki articles.
# "tags" is free-form emergent vocabulary — AI-generated, linter-maintained.

metadata:
  texts:
    tradition:
      type: string
      source: enriched
      description: >-
        the intellectual or political tradition this text belongs to
        (e.g. "marxist-leninist", "anarchist", "liberal", "social-democratic").
        Use a short lowercase label. Empty string if unclear.
    interlocutors:
      type: list
      source: enriched
      description: >-
        names of thinkers, writers, or figures this text is responding to,
        arguing against, or in direct dialogue with. Empty list if none.
    concepts:
      type: list
      source: enriched
      description: >-
        3-10 key concepts addressed in this text that could correspond to wiki
        articles. Use consistent naming (lowercase, prefer the author's own
        terminology).
    notes:
      type: string
      source: provided
      default: ""

  news:
    outlet:
      type: string
      source: provided
    relevance:
      type: string
      source: enriched
      description: >-
        a short label describing why this news item is relevant to the
        knowledge base (e.g. "economic policy", "labor movement").
    concepts:
      type: list
      source: enriched
      description: >-
        3-10 key concepts addressed that could correspond to wiki articles.
    notes:
      type: string
      source: provided
      default: ""

  ideas:
    status:
      type: string
      source: provided
    concepts:
      type: list
      source: enriched
      description: >-
        3-10 key concepts addressed that could correspond to wiki articles.
    notes:
      type: string
      source: provided
      default: ""

# Field governance constraints (for linter)
fields:
  genre:
    max_per_doc: 2
    allow_new: true
    min_uses_to_keep: 3
  tradition:
    allow_new: true
    min_uses_to_keep: 3
  tags:
    allow_new: true
    min_uses_to_keep: 2
  concepts:
    allow_new: true
    min_uses_to_promote: 5
  interlocutors:
    allow_new: true
